name: ci-mac

# DISABLED ON PURPOSE -- macOS is out of scope for KRStudio builds.
#
# macOS caps OpenGL at 4.1 and has deprecated GL entirely. KRStudio's renderer requires GL 4.3 COMPUTE shaders
# (introduced in 4.3, never available on macOS), so the compute pipeline cannot run as written. Making a Mac
# build work means porting the renderer from OpenGL to Vulkan via MoltenVK -- a large separate project, NOT a
# build-config fix. Until that port exists, this workflow only runs on manual dispatch (it will not compile the
# compute path) and never on push/PR, so it stops failing every commit. See docs/CI.md.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      VCPKG_DEFAULT_TRIPLET: arm64-osx
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: lukka/run-vcpkg@v11
        with:
          setupOnly: true

      - name: Configure (Release)
        run: cmake --preset macos-ninja-release

      - name: Build
        run: cmake --build --preset mac-release --parallel

      - name: Archive
        run: |
          cd build/macos-release
          /usr/bin/zip -r KRStudio-macOS.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: KRStudio-macOS
          path: build/macos-release/KRStudio-macOS.zip
