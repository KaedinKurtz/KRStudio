name: ci-win

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref (saves CI minutes on a long build).
concurrency:
  group: ci-win-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      # Cache the ~22 from-source vcpkg dependencies in the GitHub Actions cache so only the FIRST run pays the
      # full (multi-hour) build; later runs restore prebuilt binaries. Errors here are non-fatal (just slower).
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      # submodules: false -- external/SPlisHSPlasH is an optional, Windows-only submodule gitlink with NO
      # .gitmodules mapping, so a recursive clone fails the whole checkout (this was why every CI run died at
      # step 1). The build auto-skips it via the EXISTS guard in CMakeLists.txt; the DFSPH backend stubs out.
      - uses: actions/checkout@v4
        with:
          submodules: false

      # Expose the Actions cache endpoint to vcpkg's x-gha binary cache backend.
      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: lukka/run-vcpkg@v11
        with:
          setupOnly: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Release)
        run: cmake --preset windows-ninja-release

      - name: Build
        run: cmake --build --preset release --parallel

      # First-pass packaging: zip the release tree (refined into a clean windeployqt dist in Phase 4).
      - name: Archive
        run: |
          cd build/release
          powershell -Command "Compress-Archive -Path * -DestinationPath KRStudio-Release.zip -Force"

      - uses: actions/upload-artifact@v4
        with:
          name: KRStudio-Windows
          path: build/release/KRStudio-Release.zip
          if-no-files-found: warn
