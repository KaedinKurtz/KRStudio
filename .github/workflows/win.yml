name: ci-win

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-win-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      # Robust binary caching: vcpkg writes built packages here; actions/cache persists it across runs so only
      # the FIRST run pays the full (multi-hour) from-source build of the ~22 deps. files,readwrite is the
      # transparent backend (no flaky GHA cache-service endpoints).
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"
    steps:
      # submodules: false -- external/SPlisHSPlasH is an optional Windows-only submodule gitlink with no
      # .gitmodules; recursive clone fails checkout. CMake's EXISTS guard auto-skips it; DFSPH backend stubs out.
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Prepare vcpkg binary cache dir
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/vcpkg-bincache" | Out-Null

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-bincache
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-win-

      # Use the vcpkg pre-installed on the GitHub runner image (VCPKG_INSTALLATION_ROOT) -- no extra action.
      - name: Point VCPKG_ROOT at the runner's vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # Manifest-mode vcpkg installs the deps during configure (toolchain from the preset). This is the long step.
      - name: Configure (Release)
        run: cmake --preset windows-ninja-release

      - name: Build
        run: cmake --build --preset release --parallel

      # Clean redistributable dist: the .exe + the Qt runtime (windeployqt) + the non-Qt vcpkg DLLs + assets.
      # (The old "zip the whole build/release tree" failed -- deep CMakeFiles paths blow past Windows MAX_PATH.)
      - name: Package (clean dist)
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item build/release/RoboticsSoftware.exe $dist/ -Force
          $windeploy = Join-Path $env:VCPKG_ROOT "installed/x64-windows/tools/Qt6/bin/windeployqt.exe"
          if (Test-Path $windeploy) { & $windeploy "$dist/RoboticsSoftware.exe" --release --no-translations --no-compiler-runtime }
          $vcpkgbin = Join-Path $env:VCPKG_ROOT "installed/x64-windows/bin"
          if (Test-Path $vcpkgbin) { Copy-Item "$vcpkgbin/*.dll" $dist/ -Force -ErrorAction SilentlyContinue }
          Copy-Item build/release/*.dll $dist/ -Force -ErrorAction SilentlyContinue
          if (Test-Path build/release/assets) { Copy-Item build/release/assets (Join-Path $dist 'assets') -Recurse -Force }
          Compress-Archive -Path "$dist/*" -DestinationPath KRStudio-Windows.zip -Force
          Write-Host "dist contents:"; Get-ChildItem $dist | Select-Object -First 20 Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: KRStudio-Windows
          path: KRStudio-Windows.zip
          if-no-files-found: warn
